name: AgentCore Router Task

on:
  repository_dispatch:
    types:
      - agentcore-router-task
  workflow_dispatch:
    inputs:
      payload:
        description: "Router payload JSON"
        required: true
        type: string

concurrency:
  group: agentcore-router-task
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-router-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare directories
        run: mkdir -p .agentcore/state .agentcore/state/task-runs agentcore/inbox/tasks agentcore/knowledge/communications

      - name: Create task from router payload
        env:
          ROUTER_PAYLOAD_JSON: ${{ github.event_name == 'workflow_dispatch' && inputs.payload || toJson(github.event.client_payload) }}
        run: python3 scripts/router/create_chat_task_from_payload.py --output .agentcore/state/router-task.json

      - name: Read task metadata
        id: task
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path(".agentcore/state/router-task.json").read_text(encoding="utf-8"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"task_file={payload.get('task_file', '')}\n")
            fh.write(f"task_id={payload.get('task_id', '')}\n")
          PY

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Execute task adapter
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          AGENTCORE_TASK_RUN_COMMAND: ${{ secrets.AGENTCORE_TASK_RUN_COMMAND || 'python3 scripts/agent/run_cursor_task.py --task-file {{TASK_FILE}} --workspace .' }}
          AGENTCORE_TASK_RUN_TIMEOUT_SECONDS: ${{ secrets.AGENTCORE_TASK_RUN_TIMEOUT_SECONDS || '900' }}
          AGENTCORE_CURSOR_TIMEOUT_SECONDS: ${{ secrets.AGENTCORE_CURSOR_TIMEOUT_SECONDS || '1200' }}
          AGENTCORE_CURSOR_MODEL: ${{ secrets.AGENTCORE_CURSOR_MODEL || 'auto' }}
        run: |
          python3 scripts/email/run_task_adapter.py \
            --task-file "${{ steps.task.outputs.task_file }}" \
            --output .agentcore/state/task-run-result.json

      - name: Finalize task queue status
        run: |
          python3 scripts/email/finalize_task.py \
            --task-file "${{ steps.task.outputs.task_file }}" \
            --result-json .agentcore/state/task-run-result.json

      - name: Read final result
        id: result
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          result = json.loads(Path(".agentcore/state/task-run-result.json").read_text(encoding="utf-8"))
          status = str(result.get("status", "snag")).lower() or "snag"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"status={status}\n")
          PY

      - name: Commit agent workspace changes
        if: steps.result.outputs.status == 'done'
        continue-on-error: true
        run: |
          git add -A
          git reset -- .agentcore/state || true
          if git diff --cached --quiet; then
            echo "No agent workspace changes to commit."
          else
            git -c user.name="AgentCore Bot" -c user.email="scottishramp@gmail.com" commit -m "Apply router task changes"
            git pull --rebase origin main
            git push
          fi

      - name: Send Chat completion notification
        if: steps.result.outputs.status == 'done'
        env:
          AGENTCORE_GMAIL_CLIENT_ID: ${{ secrets.AGENTCORE_GMAIL_CLIENT_ID }}
          AGENTCORE_GMAIL_CLIENT_SECRET: ${{ secrets.AGENTCORE_GMAIL_CLIENT_SECRET }}
          AGENTCORE_GMAIL_REFRESH_TOKEN: ${{ secrets.AGENTCORE_GMAIL_REFRESH_TOKEN }}
          AGENTCORE_GMAIL_AUTHORIZED_USER_JSON: ${{ secrets.AGENTCORE_GMAIL_AUTHORIZED_USER_JSON }}
          AGENTCORE_CHAT_DM_SPACE: ${{ secrets.AGENTCORE_CHAT_DM_SPACE || 'spaces/6RZ69yAAAAE' }}
        run: |
          python3 scripts/chat/send_task_response.py \
            --task-file "${{ steps.task.outputs.task_file }}" \
            --status done \
            --result-json .agentcore/state/task-run-result.json | tee .agentcore/state/task-notify-result.json

      - name: Send Chat snag notification
        if: steps.result.outputs.status != 'done'
        env:
          AGENTCORE_GMAIL_CLIENT_ID: ${{ secrets.AGENTCORE_GMAIL_CLIENT_ID }}
          AGENTCORE_GMAIL_CLIENT_SECRET: ${{ secrets.AGENTCORE_GMAIL_CLIENT_SECRET }}
          AGENTCORE_GMAIL_REFRESH_TOKEN: ${{ secrets.AGENTCORE_GMAIL_REFRESH_TOKEN }}
          AGENTCORE_GMAIL_AUTHORIZED_USER_JSON: ${{ secrets.AGENTCORE_GMAIL_AUTHORIZED_USER_JSON }}
          AGENTCORE_CHAT_DM_SPACE: ${{ secrets.AGENTCORE_CHAT_DM_SPACE || 'spaces/6RZ69yAAAAE' }}
        run: |
          python3 scripts/chat/send_task_response.py \
            --task-file "${{ steps.task.outputs.task_file }}" \
            --status snag \
            --result-json .agentcore/state/task-run-result.json | tee .agentcore/state/task-notify-result.json

      - name: Record Chat response ledger
        continue-on-error: true
        run: |
          python3 scripts/chat/record_chat_response.py \
            --task-file "${{ steps.task.outputs.task_file }}" \
            --result-json .agentcore/state/task-run-result.json \
            --notification-json .agentcore/state/task-notify-result.json

      - name: Commit router task state
        continue-on-error: true
        run: |
          git add agentcore/inbox/tasks agentcore/knowledge/communications/chat-thread-ledger.json
          if git diff --cached --quiet; then
            echo "No router task state changes to commit."
          else
            git -c user.name="AgentCore Bot" -c user.email="scottishramp@gmail.com" commit -m "Record router task result"
            git pull --rebase origin main
            git push
          fi
