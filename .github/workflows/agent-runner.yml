name: AgentCore Async Runner

on:
  schedule:
    # Daily 8:30 AM America/Chicago (13:30 UTC during CDT); covers morning Telegram check-in window.
    - cron: "30 13 * * *"
  workflow_dispatch:
  workflow_run:
    workflows: ["AgentCore Email Sync"]
    types:
      - completed

concurrency:
  group: agentcore-async-runner
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-queued-task:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare directories
        run: mkdir -p .agentcore/state .agentcore/state/telegram-fetch .agentcore/state/task-runs agentcore/inbox/email agentcore/inbox/chat agentcore/inbox/drive agentcore/inbox/photos agentcore/inbox/tasks agentcore/knowledge/communications

      - name: Restore queue state cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .agentcore/state/email-last-uid.json
                        .agentcore/state/drive-ingest-state.json
            agentcore/knowledge/communications/email-thread-ledger.json
            agentcore/knowledge/communications/telegram-thread-ledger.json
            agentcore/knowledge/communications/telegram-transcript.md
            agentcore/knowledge/communications/scheduled-messages-state.json
            agentcore/inbox/email
            agentcore/inbox/telegram
            agentcore/inbox/drive
            agentcore/inbox/photos
            agentcore/inbox/tasks
          key: agentcore-queue-state-${{ github.run_id }}
          restore-keys: |
            agentcore-queue-state-

      - name: Repair cached JSON state
        run: python3 scripts/agent/repair_cached_json_state.py

      - name: Fetch inbox
        env:
          AGENTCORE_EMAIL: ${{ secrets.AGENTCORE_EMAIL }}
          AGENTCORE_EMAIL_APP_PASSWORD: ${{ secrets.AGENTCORE_EMAIL_APP_PASSWORD }}
          AGENTCORE_EMAIL_TRANSPORT: ${{ secrets.AGENTCORE_EMAIL_TRANSPORT || 'auto' }}
          AGENTCORE_GMAIL_CLIENT_ID: ${{ secrets.AGENTCORE_GMAIL_CLIENT_ID }}
          AGENTCORE_GMAIL_CLIENT_SECRET: ${{ secrets.AGENTCORE_GMAIL_CLIENT_SECRET }}
          AGENTCORE_GMAIL_REFRESH_TOKEN: ${{ secrets.AGENTCORE_GMAIL_REFRESH_TOKEN }}
          AGENTCORE_GMAIL_AUTHORIZED_USER_JSON: ${{ secrets.AGENTCORE_GMAIL_AUTHORIZED_USER_JSON }}
          AGENTCORE_CLIENT_EMAIL: ${{ secrets.AGENTCORE_CLIENT_EMAIL || 'briandherbert@gmail.com' }}
        run: python3 scripts/email/fetch_inbox.py --limit 30 --bootstrap-window 120

      - name: Triage messages
        run: python3 scripts/email/triage_messages.py

      - name: Fetch Telegram inbox
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.KV_REST_API_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: python3 scripts/telegram/fetch_pending.py

      - name: Triage Telegram messages
        run: python3 scripts/telegram/triage_messages.py

      - name: Commit Telegram triage artifacts
        continue-on-error: true
        run: |
          python3 scripts/agent/ensure_no_conflict_markers.py
          git add agentcore/inbox/telegram agentcore/inbox/tasks agentcore/knowledge/communications/telegram-thread-ledger.json agentcore/knowledge/communications/telegram-transcript.md
          if git diff --cached --quiet; then
            echo "No Telegram triage changes to commit."
          else
            git -c user.name="AgentCore Bot" -c user.email="scottishramp@gmail.com" commit -m "Record Telegram inbox review items"
            git -c rebase.autoStash=true pull --rebase origin main
            git push
          fi

      - name: Materialize Telegram photos to Drive
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.AGENTCORE_TELEGRAM_BOT_TOKEN }}
          AGENTCORE_EMAIL_TRANSPORT: ${{ secrets.AGENTCORE_EMAIL_TRANSPORT || 'auto' }}
          AGENTCORE_GMAIL_CLIENT_ID: ${{ secrets.AGENTCORE_GMAIL_CLIENT_ID }}
          AGENTCORE_GMAIL_CLIENT_SECRET: ${{ secrets.AGENTCORE_GMAIL_CLIENT_SECRET }}
          AGENTCORE_GMAIL_REFRESH_TOKEN: ${{ secrets.AGENTCORE_GMAIL_REFRESH_TOKEN }}
          AGENTCORE_GMAIL_AUTHORIZED_USER_JSON: ${{ secrets.AGENTCORE_GMAIL_AUTHORIZED_USER_JSON }}
          AGENTCORE_DRIVE_PHOTOS_FOLDER_ID: ${{ secrets.AGENTCORE_DRIVE_PHOTOS_FOLDER_ID }}
        run: python3 scripts/telegram/materialize_media.py

      - name: Commit Telegram photo materialization
        continue-on-error: true
        run: |
          python3 scripts/agent/ensure_no_conflict_markers.py
          git add agentcore/inbox/telegram agentcore/inbox/photos agentcore/knowledge/communications/telegram-photo-registry.json
          if git diff --cached --quiet; then
            echo "No Telegram photo materialization changes to commit."
          else
            git -c user.name="AgentCore Bot" -c user.email="scottishramp@gmail.com" commit -m "Materialize Telegram photos to Drive"
            git -c rebase.autoStash=true pull --rebase origin main
            git push
          fi

      - name: Send scheduled Telegram messages
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.AGENTCORE_TELEGRAM_BOT_TOKEN }}
          AGENTCORE_TELEGRAM_NOTIFY_CHAT_IDS: ${{ secrets.AGENTCORE_TELEGRAM_NOTIFY_CHAT_IDS || secrets.AGENTCORE_TELEGRAM_ALLOWED_USER_IDS }}
        run: python3 scripts/telegram/send_scheduled_messages.py

      - name: Persist scheduled message state
        continue-on-error: true
        run: |
          python3 scripts/agent/ensure_no_conflict_markers.py
          git add agentcore/knowledge/communications/scheduled-messages-state.json
          if git diff --cached --quiet; then
            echo "No scheduled-message state change to commit."
          else
            git -c user.name="AgentCore Bot" -c user.email="scottishramp@gmail.com" commit -m "Update scheduled message send state"
            git -c rebase.autoStash=true pull --rebase origin main
            git push
          fi

      - name: Ingest Drive docs and photos
        env:
          AGENTCORE_EMAIL_TRANSPORT: ${{ secrets.AGENTCORE_EMAIL_TRANSPORT || 'auto' }}
          AGENTCORE_GMAIL_CLIENT_ID: ${{ secrets.AGENTCORE_GMAIL_CLIENT_ID }}
          AGENTCORE_GMAIL_CLIENT_SECRET: ${{ secrets.AGENTCORE_GMAIL_CLIENT_SECRET }}
          AGENTCORE_GMAIL_REFRESH_TOKEN: ${{ secrets.AGENTCORE_GMAIL_REFRESH_TOKEN }}
          AGENTCORE_GMAIL_AUTHORIZED_USER_JSON: ${{ secrets.AGENTCORE_GMAIL_AUTHORIZED_USER_JSON }}
          AGENTCORE_DRIVE_DOCS_FOLDER_ID: ${{ secrets.AGENTCORE_DRIVE_DOCS_FOLDER_ID }}
          AGENTCORE_DRIVE_PHOTOS_FOLDER_ID: ${{ secrets.AGENTCORE_DRIVE_PHOTOS_FOLDER_ID }}
          AGENTCORE_DRIVE_INCLUDE_SHARED_WITH_ME: ${{ secrets.AGENTCORE_DRIVE_INCLUDE_SHARED_WITH_ME || 'true' }}
        run: python3 scripts/ingest/ingest_drive_updates.py

      - name: Claim next queued task
        run: python3 scripts/email/claim_next_task.py --output .agentcore/state/task-claim.json --runner-id "${GITHUB_RUN_ID}"

      - name: Read claim result
        id: claim
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          import os

          claim_path = Path(".agentcore/state/task-claim.json")
          claim = json.loads(claim_path.read_text(encoding="utf-8")) if claim_path.exists() else {}
          source_kind = ""
          task_file = claim.get('task_file', '')
          if task_file:
            try:
              text = Path(task_file).read_text(encoding="utf-8")
              for line in text.splitlines():
                if line.startswith("source_kind:"):
                  source_kind = line.split(":", 1)[1].strip().strip('"')
                  break
            except FileNotFoundError:
              pass
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"claimed={str(bool(claim.get('claimed'))).lower()}\n")
            fh.write(f"task_file={task_file}\n")
            fh.write(f"task_id={claim.get('task_id', '')}\n")
            fh.write(f"thread_key={claim.get('thread_key', '')}\n")
            fh.write(f"source_kind={source_kind}\n")
          PY

      - name: Send Telegram working notice
        if: steps.claim.outputs.claimed == 'true' && steps.claim.outputs.source_kind == 'telegram'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.AGENTCORE_TELEGRAM_BOT_TOKEN }}
        run: |
          python3 scripts/telegram/send_working_notice.py \
            --task-file "${{ steps.claim.outputs.task_file }}"

      - name: Install Cursor CLI
        if: steps.claim.outputs.claimed == 'true'
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Execute task adapter
        if: steps.claim.outputs.claimed == 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          AGENTCORE_TASK_RUN_COMMAND: ${{ secrets.AGENTCORE_TASK_RUN_COMMAND || 'python3 scripts/agent/run_cursor_task.py --task-file {{TASK_FILE}} --workspace .' }}
          AGENTCORE_TASK_RUN_TIMEOUT_SECONDS: ${{ secrets.AGENTCORE_TASK_RUN_TIMEOUT_SECONDS || '900' }}
          AGENTCORE_CURSOR_TIMEOUT_SECONDS: ${{ secrets.AGENTCORE_CURSOR_TIMEOUT_SECONDS || '1200' }}
          AGENTCORE_CURSOR_MODEL: ${{ secrets.AGENTCORE_CURSOR_MODEL || 'auto' }}
        run: |
          python3 scripts/email/run_task_adapter.py \
            --task-file "${{ steps.claim.outputs.task_file }}" \
            --output .agentcore/state/task-run-result.json

      - name: Finalize task queue status
        if: steps.claim.outputs.claimed == 'true'
        run: |
          python3 scripts/email/finalize_task.py \
            --task-file "${{ steps.claim.outputs.task_file }}" \
            --result-json .agentcore/state/task-run-result.json

      - name: Read final result
        id: result
        if: steps.claim.outputs.claimed == 'true'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          import os

          path = Path(".agentcore/state/task-run-result.json")
          result = json.loads(path.read_text(encoding="utf-8")) if path.exists() else {}
          status = str(result.get("status", "snag")).lower() or "snag"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"status={status}\n")
            fh.write(f"run_id={result.get('run_id', '')}\n")
          PY

      - name: Commit agent workspace changes
        if: steps.claim.outputs.claimed == 'true' && steps.result.outputs.status == 'done'
        continue-on-error: true
        run: |
          python3 scripts/agent/ensure_no_conflict_markers.py
          git add -A
          git reset -- .agentcore/state || true
          if git diff --cached --quiet; then
            echo "No agent workspace changes to commit."
          else
            git -c user.name="AgentCore Bot" -c user.email="scottishramp@gmail.com" commit -m "Apply async agent task changes"
            git pull --rebase origin main
            git push
          fi


      - name: Redeploy fast router for fresh bot context
        if: steps.claim.outputs.claimed == 'true' && steps.result.outputs.status == 'done'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash scripts/deploy/redeploy_fast_router.sh

      - name: Send completion notification
        if: steps.claim.outputs.claimed == 'true' && steps.result.outputs.status == 'done' && steps.claim.outputs.source_kind != 'telegram'
        env:
          AGENTCORE_EMAIL: ${{ secrets.AGENTCORE_EMAIL }}
          AGENTCORE_EMAIL_APP_PASSWORD: ${{ secrets.AGENTCORE_EMAIL_APP_PASSWORD }}
          AGENTCORE_EMAIL_TRANSPORT: ${{ secrets.AGENTCORE_EMAIL_TRANSPORT || 'auto' }}
          AGENTCORE_GMAIL_CLIENT_ID: ${{ secrets.AGENTCORE_GMAIL_CLIENT_ID }}
          AGENTCORE_GMAIL_CLIENT_SECRET: ${{ secrets.AGENTCORE_GMAIL_CLIENT_SECRET }}
          AGENTCORE_GMAIL_REFRESH_TOKEN: ${{ secrets.AGENTCORE_GMAIL_REFRESH_TOKEN }}
          AGENTCORE_GMAIL_AUTHORIZED_USER_JSON: ${{ secrets.AGENTCORE_GMAIL_AUTHORIZED_USER_JSON }}
          AGENTCORE_CLIENT_EMAIL: ${{ secrets.AGENTCORE_CLIENT_EMAIL || 'briandherbert@gmail.com' }}
        run: |
          python3 scripts/email/send_task_status.py \
            --task-file "${{ steps.claim.outputs.task_file }}" \
            --status done \
            --result-json .agentcore/state/task-run-result.json \
            --project AsyncLoop | tee .agentcore/state/task-notify-result.json

      - name: Send snag notification
        if: steps.claim.outputs.claimed == 'true' && steps.result.outputs.status != 'done' && steps.claim.outputs.source_kind != 'telegram'
        env:
          AGENTCORE_EMAIL: ${{ secrets.AGENTCORE_EMAIL }}
          AGENTCORE_EMAIL_APP_PASSWORD: ${{ secrets.AGENTCORE_EMAIL_APP_PASSWORD }}
          AGENTCORE_EMAIL_TRANSPORT: ${{ secrets.AGENTCORE_EMAIL_TRANSPORT || 'auto' }}
          AGENTCORE_GMAIL_CLIENT_ID: ${{ secrets.AGENTCORE_GMAIL_CLIENT_ID }}
          AGENTCORE_GMAIL_CLIENT_SECRET: ${{ secrets.AGENTCORE_GMAIL_CLIENT_SECRET }}
          AGENTCORE_GMAIL_REFRESH_TOKEN: ${{ secrets.AGENTCORE_GMAIL_REFRESH_TOKEN }}
          AGENTCORE_GMAIL_AUTHORIZED_USER_JSON: ${{ secrets.AGENTCORE_GMAIL_AUTHORIZED_USER_JSON }}
          AGENTCORE_CLIENT_EMAIL: ${{ secrets.AGENTCORE_CLIENT_EMAIL || 'briandherbert@gmail.com' }}
        run: |
          python3 scripts/email/send_task_status.py \
            --task-file "${{ steps.claim.outputs.task_file }}" \
            --status snag \
            --result-json .agentcore/state/task-run-result.json \
            --project AsyncLoop | tee .agentcore/state/task-notify-result.json

      - name: Send Telegram completion notification
        if: steps.claim.outputs.claimed == 'true' && steps.result.outputs.status == 'done' && steps.claim.outputs.source_kind == 'telegram'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.AGENTCORE_TELEGRAM_BOT_TOKEN }}
        run: |
          python3 scripts/telegram/send_task_response.py \
            --task-file "${{ steps.claim.outputs.task_file }}" \
            --status done \
            --result-json .agentcore/state/task-run-result.json | tee .agentcore/state/task-notify-result.json

      - name: Send Telegram snag notification
        if: steps.claim.outputs.claimed == 'true' && steps.result.outputs.status != 'done' && steps.claim.outputs.source_kind == 'telegram'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.AGENTCORE_TELEGRAM_BOT_TOKEN }}
        run: |
          python3 scripts/telegram/send_task_response.py \
            --task-file "${{ steps.claim.outputs.task_file }}" \
            --status snag \
            --result-json .agentcore/state/task-run-result.json | tee .agentcore/state/task-notify-result.json

      - name: Record email response ledger
        if: steps.claim.outputs.claimed == 'true' && steps.claim.outputs.source_kind != 'telegram'
        run: |
          python3 scripts/email/record_email_response.py \
            --task-file "${{ steps.claim.outputs.task_file }}" \
            --result-json .agentcore/state/task-run-result.json \
            --notification-json .agentcore/state/task-notify-result.json


      - name: Commit communication ledger update
        if: steps.claim.outputs.claimed == 'true'
        continue-on-error: true
        run: |
          python3 scripts/agent/ensure_no_conflict_markers.py
          git add agentcore/knowledge/communications/email-thread-ledger.json agentcore/knowledge/communications/chat-thread-ledger.json agentcore/inbox/tasks agentcore/inbox/telegram agentcore/inbox/photos agentcore/knowledge/communications/telegram-photo-registry.json
          if git diff --cached --quiet; then
            echo "No ledger changes to commit."
          else
            git -c user.name="AgentCore Bot" -c user.email="scottishramp@gmail.com" commit -m "Record async communication task result"
            git pull --rebase origin main
            git push
          fi


      - name: Drain remaining queued tasks
        if: always()
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          AGENTCORE_TASK_RUN_COMMAND: ${{ secrets.AGENTCORE_TASK_RUN_COMMAND || 'python3 scripts/agent/run_cursor_task.py --task-file {{TASK_FILE}} --workspace .' }}
          AGENTCORE_CURSOR_TIMEOUT_SECONDS: ${{ secrets.AGENTCORE_CURSOR_TIMEOUT_SECONDS || '1200' }}
          AGENTCORE_DRAIN_MAX_MINUTES: "25"
          AGENTCORE_GMAIL_CLIENT_ID: ${{ secrets.AGENTCORE_GMAIL_CLIENT_ID }}
          AGENTCORE_GMAIL_CLIENT_SECRET: ${{ secrets.AGENTCORE_GMAIL_CLIENT_SECRET }}
          AGENTCORE_GMAIL_REFRESH_TOKEN: ${{ secrets.AGENTCORE_GMAIL_REFRESH_TOKEN }}
          AGENTCORE_GMAIL_AUTHORIZED_USER_JSON: ${{ secrets.AGENTCORE_GMAIL_AUTHORIZED_USER_JSON }}
          AGENTCORE_EMAIL: ${{ secrets.AGENTCORE_EMAIL }}
          AGENTCORE_EMAIL_TRANSPORT: ${{ secrets.AGENTCORE_EMAIL_TRANSPORT || 'auto' }}
          AGENTCORE_CLIENT_EMAIL: ${{ secrets.AGENTCORE_CLIENT_EMAIL || 'briandherbert@gmail.com' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.AGENTCORE_TELEGRAM_BOT_TOKEN }}
        run: python3 scripts/agent/drain_task_queue.py

      - name: Commit drain changes
        if: always()
        continue-on-error: true
        run: |
          python3 scripts/agent/ensure_no_conflict_markers.py
          git add -A
          git reset -- .agentcore/state || true
          if git diff --cached --quiet; then
            echo "No drain changes to commit."
          else
            git -c user.name="AgentCore Bot" -c user.email="scottishramp@gmail.com" commit -m "Process remaining queued tasks"
            git pull --rebase origin main
            git push
          fi

      - name: Notify on workflow failure
        if: failure()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.AGENTCORE_TELEGRAM_BOT_TOKEN }}
          AGENTCORE_TELEGRAM_NOTIFY_CHAT_IDS: ${{ secrets.AGENTCORE_TELEGRAM_NOTIFY_CHAT_IDS || secrets.AGENTCORE_TELEGRAM_ALLOWED_USER_IDS }}
        run: |
          python3 - <<'PY'
          import json, os, sys, urllib.request
          from pathlib import Path
          sys.path.insert(0, "scripts/telegram")
          from send_task_response import send_message
          ids = [p.strip() for p in os.getenv("AGENTCORE_TELEGRAM_NOTIFY_CHAT_IDS", "").split(",") if p.strip()]
          for chat_id in ids:
              send_message(chat_id, "Hit a snag in the scheduled agent run — I'll retry on the next cycle.")
          PY

      - name: Publish runner summary
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          claim_path = Path(".agentcore/state/task-claim.json")
          result_path = Path(".agentcore/state/task-run-result.json")
          sync_loop_path = Path(".agentcore/state/telegram-sync-summary.json")
          claim = json.loads(claim_path.read_text(encoding="utf-8")) if claim_path.exists() else {}
          result = json.loads(result_path.read_text(encoding="utf-8")) if result_path.exists() else {}
          sync_loop = json.loads(sync_loop_path.read_text(encoding="utf-8")) if sync_loop_path.exists() else {}

          lines = [
              "# AgentCore Async Runner",
              "",
              f"- Claimed task: {claim.get('claimed', False)}",
              f"- Task ID: {claim.get('task_id', '')}",
              f"- Task file: {claim.get('task_file', '')}",
              f"- Stale requeued: {claim.get('stale_requeued', 0)}",
              f"- Final status: {result.get('status', '')}",
              f"- Run ID: {result.get('run_id', '')}",
              f"- Telegram triage summary available: {bool(sync_loop)}",
              f"- Telegram triage count: {sync_loop.get('created_tasks', '')}",
              
          ]
          output = "\\n".join(lines) + "\\n"
          summary_file = Path(".agentcore/state/agent-runner-summary.md")
          summary_file.write_text(output, encoding="utf-8")
          Path(__import__("os").environ["GITHUB_STEP_SUMMARY"]).write_text(output, encoding="utf-8")
          PY

      - name: Upload runner artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-runner-state
          path: |
            .agentcore/state/task-claim.json
            .agentcore/state/task-run-result.json
            .agentcore/state/task-notify-result.json
            .agentcore/state/chat-sync-summary.json
            .agentcore/state/chat-sync-loop-summary.json
            .agentcore/state/chat-sync-loop-*.json
            .agentcore/state/chat-fetch/latest.json
            .agentcore/state/chat-fetch/sync-loop.json
            .agentcore/state/agent-runner-summary.md
            .agentcore/state/task-runs/
            agentcore/inbox/email/
            agentcore/inbox/drive/
            agentcore/inbox/photos/
            agentcore/inbox/tasks/

      - name: Save queue state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .agentcore/state/email-last-uid.json
                        .agentcore/state/drive-ingest-state.json
            agentcore/knowledge/communications/email-thread-ledger.json
            agentcore/knowledge/communications/telegram-thread-ledger.json
            agentcore/knowledge/communications/telegram-transcript.md
            agentcore/knowledge/communications/scheduled-messages-state.json
            agentcore/inbox/email
            agentcore/inbox/telegram
            agentcore/inbox/drive
            agentcore/inbox/photos
            agentcore/inbox/tasks
          key: agentcore-queue-state-${{ github.run_id }}
